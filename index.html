<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gelişmiş Sanal Kumanda Konsolu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="top-bar">
        <button id="settings-btn" class="icon-btn">⚙️ Ayarlar</button>
        <button id="lock-btn" class="icon-btn">🔓 Düzenleme Modu</button>
    </div>

    <div id="gamepad-area">
        <p id="info-text">Ayarlar menüsünden gelişmiş modülleri ekleyin.</p>
    </div>

    <div id="settings-panel" class="hidden">
        <div class="panel-header">
            <h3>Kumanda Laboratuvarı</h3>
            <button id="close-settings-btn">✖</button>
        </div>
        <div class="panel-content">
            
            <div class="setting-group">
                <button id="connect-bt-btn">🔗 Bluetooth Cihazına Bağlan</button>
                <span id="bt-status">Bağlı Değil</span>
            </div>
            <hr>

            <div class="setting-group">
                <label for="bg-color-picker">Arka Plan Rengi:</label>
                <input type="color" id="bg-color-picker" value="#121214">
            </div>
            <div class="setting-group">
                <label for="btn-color-picker">Butonların Rengi:</label>
                <input type="color" id="btn-color-picker" value="#00e676">
            </div>
            <div class="setting-group">
                <label for="text-color-picker">Buton Yazı Rengi:</label>
                <input type="color" id="text-color-picker" value="#121214">
            </div>
            <hr>
            
            <div class="setting-group">
                <label>Joystick Modülleri:</label>
                <button id="add-normal-joy-btn" style="background: #2196f3; color: white;">🕹️ Normal Joystick Ekle</button>
                <button id="add-wasd-joy-btn" style="background: #9c27b0; color: white; margin-top: 5px;">🕹️ WASD Joystick Ekle</button>
            </div>
            <hr>
            
            <div class="setting-group">
                <label><strong>1. Standart Tuş Ekle</strong></label>
                <div style="position: relative;">
                    <input type="text" id="key-input" placeholder="Örn: Shift, F1, Mouse 1..." autocomplete="off">
                    <div id="autocomplete-list" class="autocomplete-suggestions hidden"></div>
                </div>
                <button id="add-button-btn" style="margin-top: 8px;">➕ Standart Buton Ekle</button>
            </div>
            <hr>

            <div class="setting-group">
                <label><strong>2. Metin Makro Butonu Ekle</strong></label>
                <input type="text" id="macro-string-input" placeholder="Örn: Hello world! veya /spawn...">
                <button id="add-macro-string-btn" style="background: #e91e63; color: white; margin-top: 8px;">📝 Metin Butonu Ekle</button>
            </div>
            <hr>

            <div class="setting-group">
                <label><strong>3. Kombinasyon Butonu Ekle (Kutu + Kutu)</strong></label>
                
                <div id="combo-boxes-container">
                    <div class="combo-row">
                        <input type="text" class="combo-box-input" placeholder="Ctrl" autocomplete="off">
                        <span class="combo-plus">+</span>
                        <input type="text" class="combo-box-input" placeholder="C" autocomplete="off">
                    </div>
                </div>

                <div style="display: flex; gap: 5px; margin-top: 8px;">
                    <button id="add-combo-box-field" style="background: #795548; color: white; padding: 8px;">➕ Kutu Ekle</button>
                    <button id="remove-combo-box-field" style="background: #ff5722; color: white; padding: 8px;">🗑️ Son Kutuyu Sil</button>
                </div>

                <button id="add-combo-btn" style="background: #ff9800; color: white; margin-top: 8px;">🎛️ Kombinasyon Butonunu Ekle</button>
            </div>
            <hr>

            <div class="setting-group">
                <button id="save-layout-btn">💾 Düzeni Kaydet</button>
                <button id="clear-layout-btn" style="background: #ef4444; color: white; margin-top: 5px;">🗑️ Hafızayı Sıfırla</button>
            </div>
        </div>
    </div>

    <div id="custom-confirm" class="confirm-overlay hidden">
        <div class="confirm-box">
            <h4>Akıllı Renk Uyumu</h4>
            <p id="confirm-message">Renk düzeni algılanıyor...</p>
            <div class="confirm-buttons">
                <button id="confirm-yes" style="background: #00e676; color: #121214;">Evet, Ayarla</button>
                <button id="confirm-no" style="background: #ef4444; color: white;">Hayır, Kalsın</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
